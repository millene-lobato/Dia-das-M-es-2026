<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">

  <title>Cartinha Pra Você 💖</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- FOTO -->
    <img src="foto1.jpeg" class="foto">

    <!-- ENVELOPE -->
    <div class="envelope" onclick="abrirCarta()">

      <div class="tampa"></div>

      <div class="corpo"></div>

      <div class="coracao">❤️</div>

      <!-- CARTA -->
      <div class="carta">

        <p>Mãe, minha flor, minha rainha! 💖</p>

        <!-- VIDEO -->
        <div class="video-container">

          <video controls>
            <source src="video.mp4" type="video/mp4">
          </video>

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
