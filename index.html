<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartinha 💌</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(to bottom,#ffd6e7,#ffb6d5);
      font-family:Arial, sans-serif;
      position:relative;
    }

    /* CORAÇÕES SUBINDO */
    .heart{
      position:absolute;
      bottom:-50px;
      color:#ff2e74;
      animation:subir 5s linear infinite;
      opacity:0;
      font-size:25px;
    }

    @keyframes subir{
      0%{
        transform:translateY(0) scale(0.5);
        opacity:0;
      }

      20%{
        opacity:1;
      }

      100%{
        transform:translateY(-120vh) scale(1.4);
        opacity:0;
      }
    }

    .container{
      position:relative;
      width:320px;
      height:250px;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* CARTA */
    .envelope{
      position:absolute;
      width:300px;
      height:190px;
      background:#fff0f5;
      border-radius:15px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      overflow:hidden;
      transition:0.6s;
    }

    /* TAMPA */
    .top{
      position:absolute;
      width:100%;
      height:100px;
      background:#ff8fb1;
      clip-path:polygon(0 0,100% 0,50% 100%);
      transform-origin:top;
      transition:0.6s;
      z-index:5;
    }

    /* PAPEL */
    .letter{
      position:absolute;
      width:90%;
      height:85%;
      background:white;
      left:5%;
      top:10%;
      border-radius:10px;
      padding:15px;
      text-align:center;
      transition:0.6s;
      overflow:auto;
    }

    .letter h1{
      color:#ff4f8b;
      font-size:22px;
      margin-bottom:10px;
    }

    .letter p{
      color:#444;
      font-size:15px;
      margin-bottom:12px;
    }

    video{
      width:100%;
      border-radius:10px;
      margin-top:5px;
    }

    /* BOTÃO CORAÇÃO */
    .btn{
      position:absolute;
      bottom:-25px;
      width:70px;
      height:70px;
      background:#ff2e74;
      transform:rotate(-45deg);
      cursor:pointer;
      transition:0.3s;
      z-index:10;
    }

    .btn::before,
    .btn::after{
      content:"";
      position:absolute;
      width:70px;
      height:70px;
      background:#ff2e74;
      border-radius:50%;
    }

    .btn::before{
      top:-35px;
      left:0;
    }

    .btn::after{
      left:35px;
      top:0;
    }

    .btn:hover{
      transform:rotate(-45deg) scale(1.1);
      filter:brightness(1.1);
    }

    .btn:active{
      transform:rotate(-45deg) scale(0.95);
    }

    /* ABRIR CARTA */
    .open .top{
      transform:rotateX(180deg);
    }

    .open .letter{
      transform:translateY(-60px);
    }

  </style>
</head>

<body>

  <!-- CORAÇÕES -->
  <div id="hearts"></div>

  <div class="container" id="container">

    <div class="envelope">

      <div class="top"></div>

      <div class="letter">
        <h1>Para Você 💖</h1>

        <p>
          Você é uma das coisas mais lindas que aconteceram na minha vida.
          Espero que esse momento deixe seu dia ainda mais especial ✨
        </p>

        <!-- COLOQUE SEU VÍDEO -->
        <video controls>
          <source src="WhatsApp Video 2026-05-11 at 00.01.40.mp4" type="video/mp4">
        </video>

      </div>
    </div>

    <div class="btn" id="btn"></div>

  </div>

<script>

const btn = document.getElementById("btn");
const container = document.getElementById("container");
const hearts = document.getElementById("hearts");

let aberto = false;
let intervalo;

btn.addEventListener("click", () => {

  aberto = !aberto;

  container.classList.toggle("open");

  if(aberto){
    iniciarCoracoes();
  }else{
    pararCoracoes();
  }

});

function criarCoracao(){

  const heart = document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML = "❤";

  heart.style.left = Math.random() * 100 + "vw";

  heart.style.fontSize = Math.random() * 20 + 20 + "px";

  heart.style.animationDuration = Math.random() * 3 + 3 + "s";

  hearts.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },6000);

}

function iniciarCoracoes(){

  intervalo = setInterval(criarCoracao,300);

}

function pararCoracoes(){

  clearInterval(intervalo);

}

</script>

</body>
</html>
